name: Welcome Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python welcome_bot.py
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          GHL_USER_ID: ${{ secrets.GHL_USER_ID }}
          FROM_NAME: "Jayson | The Scroll"
          FROM_EMAIL: "jayson@salesfunnelmarketing.us"
          NEWSLETTER_FORM_ID: "H3x8RB2QY1aofmWEVw00"
